<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MANDO ELITE TITANIUM - V6.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #1a2a6c; --accent: #3b82f6; --urgente: #ef4444; --verde: #10b981; --oro: #f59e0b; --dark: #0f172a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: row; height: 100vh; overflow: hidden; }
        
        @media (max-width: 1000px) { 
            body { flex-direction: column; overflow-y: auto; height: auto; } 
            .col-radar, .col-comms { width: 100% !important; height: 450px; border:none !important; border-top: 2px solid #e2e8f0 !important; } 
        }

        /* COL 1: RADAR */
        .col-radar { width: 280px; background: var(--dark); color: white; display: flex; flex-direction: column; border-right: 1px solid #334155; }
        .radar-feed { flex: 1; overflow-y: auto; padding: 15px; }
        .radar-card { background: #1e293b; border-left: 4px solid var(--urgente); padding: 12px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* COL 2: PIZARRA (INTACTA) */
        .col-pizarra { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: var(--bg); }
        .glass-panel { background: var(--card); border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        #lista-tareas { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .task-card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .prio-ALTA { border-left: 8px solid var(--urgente); }
        .prio-MEDIA { border-left: 8px solid var(--oro); }
        
        /* COL 3: DOMINGUITO & EXPEDIENTES (IDA Y VUELTA) */
        .col-comms { width: 350px; background: white; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .tab-btn { flex: 1; padding: 15px 0; border: none; background: #f8fafc; cursor: pointer; font-weight: 800; color: #64748b; border-bottom: 2px solid transparent; }
        .tab-btn.activa { background: white; color: var(--primary); border-bottom: 2px solid var(--primary); }
        
        .chat-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #f8fafc; }
        .msg { padding: 10px 12px; border-radius: 10px; font-size: 13px; max-width: 90%; word-wrap: break-word; }
        .msg-me { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .msg-them { background: white; border: 1px solid #e2e8f0; align-self: flex-start; border-bottom-left-radius: 0; }
        .msg-bot { background: #eff6ff; border: 1px solid var(--accent); color: #1e3a8a; align-self: flex-start; width: 100%; border-radius: 8px; }

        input, select { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; width: 100%; font-size: 13px; outline: none; }
        input:focus, select:focus { border-color: var(--accent); }
        .btn-pro { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; transition: 0.2s; }
        
        #bloqueo-mando { position:fixed; inset:0; background:var(--dark); z-index:50000; display:flex; align-items:center; justify-content:center; color:white;}
    </style>
</head>
<body>

<audio id="snd-radar" src="https://assets.mixkit.co/active_storage/sfx/2870/2870-preview.mp3" preload="auto"></audio>

<div id="bloqueo-mando">
    <div style="text-align:center; width: 90%; max-width: 350px; background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <h2 style="color:var(--accent); margin-bottom: 20px;">IDENTIFICACIÓN ELITE</h2>
        <select id="sel-empleado" style="margin-bottom: 15px; background: #0f172a; color: white; border-color: #334155;">
            <option value="">Cargando personal...</option>
        </select>
        <input type="password" id="pass-mando" placeholder="Clave (Solo Admin/Directores)" style="margin-bottom: 15px; background: #0f172a; color: white; border-color: #334155;">
        <button class="btn-pro" style="width:100%; background: var(--verde); padding: 15px; font-size: 14px;" onclick="loginMando()">INGRESAR AL SISTEMA</button>
    </div>
</div>

<div class="col-radar">
    <div style="padding:20px; font-weight:800; font-size: 14px; letter-spacing: 1px; border-bottom: 1px solid #334155;">
        👁️ RADAR TÁCTICO
    </div>
    <div id="radar-feed" class="radar-feed">
        <div style="text-align:center; color:#64748b; font-size:12px; margin-top:20px;">Monitoreando bases de datos...</div>
    </div>
</div>

<div class="col-pizarra">
    <div class="header glass-panel" style="display:flex; justify-content:space-between; align-items:center;">
        <div>
            <h2 style="margin:0; font-size:16px;">Misiones Elite</h2>
            <span id="user-tag" style="color:var(--accent); font-size:11px; font-weight: bold;"></span>
        </div>
        <div style="display:flex; gap:5px;">
            <button id="btn-caja" class="btn-pro" style="display:none; background:var(--verde); font-size:10px;" onclick="window.location.href='rendicion.html'">CAJA</button>
            <button class="btn-pro" style="background:#64748b; font-size:10px;" onclick="location.reload()">SALIR</button>
        </div>
    </div>
    
    <div class="glass-panel">
        <input type="text" id="t-desc" placeholder="Describir nueva misión o instrucción...">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:8px">
            <input type="date" id="t-vence">
            <select id="t-prio-val"><option value="BAJA">Baja</option><option value="MEDIA" selected>Media</option><option value="ALTA">URGENTE 🔥</option></select>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:8px">
            <select id="t-dest-val"><option value="TODOS">TODOS</option><option value="SECRETARIA">SECRETARÍA</option><option value="DIRECTORES">DIRECTORES</option><option value="ADMINISTRACION">ADMIN</option><option value="COORD">COORD</option><option value="T.S.">T. SOCIALES</option></select>
            <input type="text" id="t-drive-val" placeholder="Link Drive (Opcional)">
        </div>
        <button class="btn-pro" style="width:100%; margin-top:10px;" onclick="crearTarea()">LANZAR MISIÓN ✨</button>
    </div>
    
    <div style="display:flex; gap:10px;">
        <select id="f-est" onchange="renderPizarraLocal()" style="flex:1"><option value="ACTIVAS">Misiones Activas</option><option value="CONFIRMADO">Historial</option></select>
    </div>
    
    <div id="lista-tareas"></div>
</div>

<div class="col-comms">
    <div style="display: flex;">
        <button id="tab1" class="tab-btn activa" onclick="switchTab(1)">🧠 EXPEDIENTE</button>
        <button id="tab2" class="tab-btn" onclick="switchTab(2)">🌐 GLOBAL</button>
    </div>

    <div id="vista-expediente" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <div style="padding: 10px; border-bottom: 1px solid #e2e8f0; background: #f8fafc;">
            <select id="sel-paciente" onchange="cargarExpedientePaciente()">
                <option value="">Selecciona un paciente a reportar...</option>
            </select>
            <div id="panel-asignar-ts" style="display: none; margin-top: 5px; gap: 5px;">
                <select id="sel-asignar-ts" style="font-size: 10px; padding: 5px;"></select>
                <button class="btn-pro" style="padding: 5px; font-size: 10px;" onclick="asignarTS()">VINCULAR T.S.</button>
            </div>
        </div>
        <div id="chat-dominguito" class="chat-content">
            <div style="text-align:center; color:#94a3b8; font-size:11px; margin-top:20px;">
                Seleccioná un paciente. Todo lo que escribas acá será leído por Dominguito (Python) para actualizar su ficha técnica.
            </div>
        </div>
        <div style="padding:10px; display:flex; gap:5px; border-top: 1px solid #e2e8f0;">
            <input type="text" id="in-dominguito" placeholder="Reportar novedad clínica..." onkeypress="if(event.key==='Enter') enviarReporteDominguito()">
            <button class="btn-pro" style="width: 50px;" onclick="enviarReporteDominguito()">></button>
        </div>
    </div>

    <div id="vista-global" style="flex:1; display:none; flex-direction:column; overflow:hidden;">
        <div id="chat-msgs" class="chat-content"></div>
        <div style="padding:10px; display:flex; gap:5px; border-top: 1px solid #e2e8f0;">
            <input type="text" id="chat-in" placeholder="Mensaje a todos..." onkeypress="if(event.key==='Enter') enviarMsg()">
            <button class="btn-pro" style="width: 50px;" onclick="enviarMsg()">></button>
        </div>
    </div>
</div>

<script>
    // 1. CONEXIÓN A TU FIREBASE REAL
    const firebaseConfig = { apiKey: "AIzaSyAugXXx_b_wKFByhDbLZslk2HA_UTzrzd8", authDomain: "clinicaintegral-5c488.firebaseapp.com", databaseURL: "https://clinicaintegral-5c488-default-rtdb.firebaseio.com", projectId: "clinicaintegral-5c488", appId: "1:184090967634:web:09715937b33ea48288698b" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. REFERENCIAS
    const refPizarra = db.ref('/SISTEMA_MANDO/pizarra');
    const refChatGlobal = db.ref('/SISTEMA_MANDO/chat');
    const refExpedientes = db.ref('/SISTEMA_MANDO/expedientes_interactivos'); // Acá Python va a leer y escribir
    const refAsignaciones = db.ref('/SISTEMA_MANDO/asignaciones_ts');

    let usuarioActivo = "", rangoActivo = "", appCargada = false, cacheTareas = {};
    let listaPacientesCache = [];
    let pacienteSeleccionado = "";

    // 3. INICIO: CARGAR EMPLEADOS DIRECTO DE TU BASE
    db.ref('/SISTEMA_PERSONAL/empleados').once('value', snap => {
        let sel = document.getElementById('sel-empleado');
        let selTs = document.getElementById('sel-asignar-ts');
        let htmlTs = '<option value="">Seleccionar T.S.</option>';

        snap.forEach(child => {
            const emp = child.val();
            if(emp && emp.n) {
                sel.innerHTML += `<option value="${emp.n}" data-rol="${emp.profesion || 'Empleado'}">${emp.n} (${emp.profesion || 'S/D'})</option>`;
                if(emp.profesion === "TS" || emp.profesion === "T.S." || emp.profesion === "Trabajadora Social") {
                    htmlTs += `<option value="${emp.n}">${emp.n}</option>`;
                }
            }
        });
        selTs.innerHTML = htmlTs;
    });

    // 4. LOGIN INTELIGENTE
    function loginMando() {
        const select = document.getElementById('sel-empleado');
        if(!select.value) return alert("Selecciona tu nombre");
        
        const option = select.options[select.selectedIndex];
        usuarioActivo = option.value;
        rangoActivo = option.getAttribute('data-rol').toUpperCase();
        const pass = document.getElementById('pass-mando').value;

        // Permisos Especiales
        if(usuarioActivo.includes("SALINAS LEONARDO") && pass === "1986") {
            rangoActivo = "ADMINISTRACION";
        } else if (rangoActivo.includes("DIRECTOR") && pass !== "1515") {
            return alert("Clave de Director incorrecta");
        }

        document.getElementById('bloqueo-mando').style.display = 'none';
        document.getElementById('user-tag').innerText = `${usuarioActivo} | ${rangoActivo}`;
        
        if(rangoActivo === 'ADMINISTRACION' || rangoActivo.includes('COORD') || rangoActivo.includes('DIRECTOR')) {
            document.getElementById('panel-asignar-ts').style.display = 'flex';
            document.getElementById('btn-caja').style.display = 'block';
        }

        iniciarApp();
    }

    // 5. MOTOR PRINCIPAL
    function iniciarApp() {
        // Cargar Pizarra
        refPizarra.on('value', snap => {
            cacheTareas = snap.val() || {};
            renderPizarraLocal();
        });

        // Cargar Chat Global
        
refChatGlobal.on('value', snap => {
    document.getElementById('chat-msgs').innerHTML = "";
    snap.forEach(child => {
        const m = child.val();
        
        // Filtro de jerarquía:
        const esAdmin = ['DIRECTOR', 'DIRECTORA', 'ADMINISTRACION', 'COORD', 'T.S.'].some(r => rangoActivo.includes(r));
        
        // Si el mensaje es "PRIVADO" (destinado a directores) y yo no soy admin, no lo muestro
        if (m.privado === true && !esAdmin) return;
       
    });
});
        // Activar Radar Titanium
        escanearBaseDeDatos();
    }

    // =========================================================
    // MÓDULO TITANIUM: EL RADAR QUE BUSCA DONDE CORRESPONDE
    // =========================================================
    function escanearBaseDeDatos() {
    const feed = document.getElementById('radar-feed');
    const selectPac = document.getElementById('sel-paciente');

    // Escaneamos la raíz para detectar cualquier rama (SAEI, cd, cet, etc)
    db.ref('/').once('value', snap => {
        snap.forEach(rama => {
            // Si la rama tiene pacientes, los procesamos
            if (rama.child('pacientes').exists()) {
                rama.child('pacientes').forEach(childPac => {
                    const nombre = childPac.key;
                    const pac = childPac.val();

                    // 1. Llenar el selector de pacientes (sin duplicados)
                    if(!listaPacientesCache.includes(nombre)) {
                        listaPacientesCache.push(nombre);
                        let opt = document.createElement('option');
                        opt.value = nombre;
                        opt.text = nombre;
                        selectPac.add(opt);
                    }

                    // 2. Radar de CUDs vencidos o por vencer
                    if(pac.cud) {
                        const hoy = new Date();
                        const venc = new Date(pac.cud);
                        const diff = Math.floor((venc - hoy) / (1000 * 60 * 60 * 24));
                        
                        if(diff <= 60) { // Alerta si faltan 60 días o ya venció
                            renderizarAlerta(nombre, 'CUD', `Vence: ${pac.cud} (${diff} días)`);
                        }
                    }
                });
            }
        });
    });
}
        // 2. Escanear Asistencias en seguimiento_pacientes
        db.ref('/seguimiento_pacientes').on('value', snap => {
            snap.forEach(child => {
                const nombre = child.key;
                const data = child.val();
                let faltas = 0;
                Object.values(data).forEach(estado => { if(estado === 'A' || estado.val === 'A') faltas++; });
                
                if(faltas >= 3) {
                    renderizarAlerta(nombre, 'AUSENCIAS', `Paciente acumula ${faltas} inasistencias registradas.`);
                }
            });
        });
    }

    function renderizarAlerta(paciente, tipo, msg) {
        const feed = document.getElementById('radar-feed');
        // Borrar el mensaje de "Monitoreando" si es la primera alerta
        if(feed.innerHTML.includes("Monitoreando")) feed.innerHTML = "";
        
        const idUnico = (paciente+tipo).replace(/[^a-zA-Z0-9]/g, '');
        if(document.getElementById(idUnico)) return; // Evitar duplicados visuales

        const color = tipo === 'CUD' ? 'var(--urgente)' : 'var(--oro)';
        feed.innerHTML = `
            <div id="${idUnico}" class="radar-card" style="border-left-color: ${color}">
                <div style="font-size:10px; font-weight:900; color:${color}">${tipo}</div>
                <div style="font-size:13px; margin:4px 0; font-weight:800; color:white;">${paciente}</div>
                <div style="font-size:11px; color:#94a3b8;">${msg}</div>
            </div>
        ` + feed.innerHTML;
        
        document.getElementById('snd-radar').play().catch(()=>{});
    }

    // =========================================================
    // IDA Y VUELTA CON PYTHON (EXPEDIENTES DOMINGUITO)
    // =========================================================
    function switchTab(tab) {
        document.getElementById('tab1').className = tab === 1 ? 'tab-btn activa' : 'tab-btn';
        document.getElementById('tab2').className = tab === 2 ? 'tab-btn activa' : 'tab-btn';
        document.getElementById('vista-expediente').style.display = tab === 1 ? 'flex' : 'none';
        document.getElementById('vista-global').style.display = tab === 2 ? 'flex' : 'none';
    }

    function asignarTS() {
        if(!pacienteSeleccionado) return alert("Selecciona un paciente primero");
        const ts = document.getElementById('sel-asignar-ts').value;
        if(!ts) return;
        refAsignaciones.child(pacienteSeleccionado).set(ts);
        alert(`Paciente asignado a T.S: ${ts}`);
    }

    function cargarExpedientePaciente() {
        pacienteSeleccionado = document.getElementById('sel-paciente').value;
        const chatContainer = document.getElementById('chat-dominguito');
        
        if(!pacienteSeleccionado) {
            chatContainer.innerHTML = `<div style="text-align:center; color:#94a3b8; font-size:11px; margin-top:20px;">Seleccioná un paciente.</div>`;
            return;
        }

        // Escuchar el hilo de este paciente específico. ¡Python leerá de acá!
        refExpedientes.child(pacienteSeleccionado).on('value', snap => {
            const msgs = snap.val() || {};
            chatContainer.innerHTML = `<div style="font-size:10px; text-align:center; color:#94a3b8; margin-bottom:10px;">EXPEDIENTE ABIERTO: ${pacienteSeleccionado}</div>`;
            
            Object.values(msgs).forEach(m => {
                // Si el autor es Dominguito, tiene un estilo distinto
                let claseMsg = m.autor === usuarioActivo ? 'msg-me' : 'msg-them';
                if(m.autor === "DOMINGUITO") claseMsg = 'msg-bot';
                
                chatContainer.innerHTML += `
                    <div class="msg ${claseMsg}">
                        <b style="font-size:9px; display:block; opacity:0.7">${m.autor} (${m.rol})</b>
                        ${m.msg}
                    </div>
                `;
            });
            chatContainer.scrollTop = 9999;
        });
    }

    function enviarReporteDominguito() {
        if(!pacienteSeleccionado) return alert("Seleccioná un paciente");
        const txt = document.getElementById('in-dominguito').value;
        if(!txt) return;

        // Escribimos en la ruta que Python va a estar escuchando
        refExpedientes.child(pacienteSeleccionado).push({
            autor: usuarioActivo,
            rol: rangoActivo,
            msg: txt,
            ts: Date.now()
        });
        document.getElementById('in-dominguito').value = '';
    }

    // =========================================================
    // CÓDIGO MADRE (PIZARRA GLOBAL INTACTA)
    // =========================================================
    function renderPizarraLocal() {
        const container = document.getElementById('lista-tareas'); 
        container.innerHTML = "";
        const fEst = document.getElementById('f-est').value;
        
        Object.keys(cacheTareas).reverse().forEach(id => {
            const t = cacheTareas[id];
            
            // Filtro de visibilidad respetando jerarquías
            if(rangoActivo !== 'ADMINISTRACION' && !rangoActivo.includes('DIRECTOR')) {
                if(t.destino !== rangoActivo && t.destino !== 'TODOS' && t.emisor !== usuarioActivo) return;
            }
            if(fEst === 'ACTIVAS' && t.estado === 'CONFIRMADO') return;
            if(fEst === 'CONFIRMADO' && t.estado !== 'CONFIRMADO') return;

            const yaVi = (t.vistos || {})[usuarioActivo];
            container.innerHTML += `
                <div class="task-card prio-${t.prio}">
                    <div style="font-size:9px; color:#64748b; margin-bottom:5px;">VENCE: ${t.vence || 'S/D'} | DE: ${t.emisor}</div>
                    <h3 style="margin:0 0 10px 0; font-size:14px;">${t.desc}</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                        <button class="btn-pro" style="background:${yaVi?'#f1f5f9':'#fff'}; color:${yaVi?'var(--verde)':'#64748b'}; border:1px solid #ccc;" onclick="marcarVisto('${id}')">${yaVi?'✔ VISTO':'VISTO'}</button>
                        <button class="btn-pro" style="background:var(--verde);" onclick="cambiarEst('${id}', 'CONFIRMADO')">LISTO</button>
                    </div>
                </div>`;
        });
    }

    function marcarVisto(id) { refPizarra.child(`${id}/vistos/${usuarioActivo}`).set(true); }
    function cambiarEst(id, est) { if(confirm("¿Finalizar misión?")) refPizarra.child(id).update({ estado: est }); }
    function crearTarea() { 
        const d = document.getElementById('t-desc').value; 
        if(!d) return; 
        refPizarra.push({ 
            desc: d, vence: document.getElementById('t-vence').value || 'S/D', prio: document.getElementById('t-prio-val').value, 
            destino: document.getElementById('t-dest-val').value, emisor: usuarioActivo, estado: 'PENDIENTE'
        }); 
        document.getElementById('t-desc').value=""; 
    }
    function enviarMsg() {
    const v = document.getElementById('chat-in').value;
    const destino = document.getElementById('select-destino').value; // Agregá un select nuevo en el HTML
    
    if(v) {
        refChatGlobal.push({ 
            u: usuarioActivo, 
            t: v, 
            rol: rangoActivo,
            destino: destino // Esto es clave
        });
        document.getElementById('chat-in').value=""; 
    } 
}
</script>
</body>
</html>
