<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MANDO ELITE TITANIUM - V6.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #1a2a6c; --accent: #3b82f6; --urgente: #ef4444; --verde: #10b981; --oro: #f59e0b; --dark: #0f172a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: row; height: 100vh; overflow: hidden; }
        @media (max-width: 1000px) { body { flex-direction: column; height: auto; overflow-y: auto; display: block; } .col-radar, .col-pizarra, .col-comms { width: 100% !important; height: auto !important; min-height: 50vh; border-right: none; border-bottom: 2px solid #e2e8f0; } }
        .col-radar { width: 280px; background: var(--dark); color: white; display: flex; flex-direction: column; border-right: 1px solid #334155; }
        .radar-feed { flex: 1; overflow-y: auto; padding: 15px; }
        .radar-card { background: #1e293b; border-left: 4px solid var(--urgente); padding: 12px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .col-pizarra { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: var(--bg); }
        .glass-panel { background: var(--card); border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        #lista-tareas { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .task-card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .col-comms { width: 350px; background: white; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .tab-btn { flex: 1; padding: 15px 0; border: none; background: #f8fafc; cursor: pointer; font-weight: 800; color: #64748b; border-bottom: 2px solid transparent; }
        .tab-btn.activa { background: white; color: var(--primary); border-bottom: 2px solid var(--primary); }
        .chat-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #f8fafc; }
        .msg { padding: 10px 12px; border-radius: 10px; font-size: 13px; max-width: 90%; word-wrap: break-word; }
        .msg-me { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .msg-them { background: white; border: 1px solid #e2e8f0; align-self: flex-start; border-bottom-left-radius: 0; }
        .btn-pro { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; }
        #bloqueo-mando { position:fixed; inset:0; background:var(--dark); z-index:50000; display:flex; align-items:center; justify-content:center; color:white; }
    </style>
</head>
<body>

<div id="bloqueo-mando">
    <div style="text-align:center; width: 90%; max-width: 350px; background: #1e293b; padding: 30px; border-radius: 15px;">
        <h2 style="color:var(--accent); margin-bottom: 20px;">ACCESO ELITE</h2>
        <select id="sel-empleado" style="margin-bottom: 15px; width:100%; padding: 10px; background: #0f172a; color: white; border: 1px solid #334155;"></select>
        <input type="password" id="pass-mando" placeholder="Clave (Si aplica)" style="margin-bottom: 15px; width:100%; padding: 10px; background: #0f172a; color: white; border: 1px solid #334155;">
        <button class="btn-pro" style="width:100%; background: var(--verde); padding: 15px;" onclick="loginMando()">ENTRAR A MI PANEL</button>
    </div>
</div>

<div class="col-radar">
    <div style="padding:20px; font-weight:800; font-size: 14px; border-bottom: 1px solid #334155;">👁️ RADAR TÁCTICO</div>
    <div id="radar-feed" class="radar-feed"></div>
</div>

<div class="col-pizarra">
    <div class="header glass-panel">
        <h2 id="user-tag" style="margin:0; font-size:16px;">Esperando login...</h2>
        <button class="btn-pro" onclick="location.reload()">SALIR</button>
    </div>
    <div id="panel-liquidacion" class="glass-panel" style="display:none;"></div>
    <div class="glass-panel">
        <input type="text" id="t-desc" placeholder="Nueva misión...">
        <button class="btn-pro" onclick="crearTarea()">LANZAR MISIÓN ✨</button>
    </div>
    <div id="lista-tareas"></div>
</div>

<div class="col-comms">
    <div style="display: flex;">
        <button id="tab1" class="tab-btn activa" onclick="switchTab(1)">🧠 EXPEDIENTE</button>
        <button id="tab2" class="tab-btn" onclick="switchTab(2)">🌐 GLOBAL</button>
    </div>
    <div id="vista-expediente" style="flex:1; display:flex; flex-direction:column;">
        <select id="sel-paciente" onchange="cargarExpedientePaciente()"><option value="">Selecciona paciente...</option></select>
        <div id="chat-dominguito" class="chat-content"></div>
        <input type="text" id="in-dominguito" placeholder="Reportar..." onkeypress="if(event.key==='Enter') enviarReporteDominguito()">
    </div>
    <div id="vista-global" style="display:none; flex-direction:column; flex:1;">
        <div id="chat-msgs" class="chat-content"></div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAugXXx_b_wKFByhDbLZslk2HA_UTzrzd8", 
        authDomain: "clinicaintegral-5c488.firebaseapp.com", 
        databaseURL: "https://clinicaintegral-5c488-default-rtdb.firebaseio.com", 
        projectId: "clinicaintegral-5c488", 
        appId: "1:184090967634:web:09715937b33ea48288698b" 
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database(); 

    // Referencias Globales
    let usuarioActivo = "", rangoActivo = "";
    
    // Auth inicial (Solo asegurar conexión)
    firebase.auth().onAuthStateChanged((user) => {
        if (!user) firebase.auth().signInAnonymously();
    });

    // Cargar empleados al inicio
    db.ref('/SISTEMA_PERSONAL/empleados').once('value', snap => {
        const sel = document.getElementById('sel-empleado');
        snap.forEach(child => {
            const emp = child.val();
            if(emp && emp.n) {
                const opt = document.createElement('option');
                opt.value = emp.n;
                opt.text = emp.n;
                opt.setAttribute('data-rol', emp.profesion || 'Empleado');
                sel.add(opt);
            }
        });
    });

    // Lógica de Login/Token
    function loginMando() {
        const select = document.getElementById('sel-empleado');
        if(!select.value) return alert("Selecciona tu nombre");

        const usuario = select.value;
        const option = select.options[select.selectedIndex];
        usuarioActivo = usuario;
        rangoActivo = option.getAttribute('data-rol').toUpperCase();

        const tokenGuardado = localStorage.getItem('mando_token');
        const usuarioGuardado = localStorage.getItem('mando_usuario');

        // Check LocalStorage
        if (usuario === usuarioGuardado && tokenGuardado) {
            validarToken(usuario, tokenGuardado, true); // true = auto
        } else {
            const tokenPrompt = prompt("Ingrese su TOKEN personal:");
            if (tokenPrompt) validarToken(usuario, tokenPrompt, false);
        }
    }

    function validarToken(nombre, token, esAuto) {
        db.ref('tokens/' + nombre).once('value', snap => {
            const tokenCorrecto = snap.val();
            if (tokenCorrecto && tokenCorrecto === token) {
                localStorage.setItem('mando_token', token);
                localStorage.setItem('mando_usuario', nombre);
                iniciarSesion();
            } else if (!tokenCorrecto && !esAuto) {
                db.ref('tokens/' + nombre).set(token);
                iniciarSesion();
            } else {
                alert("Token incorrecto.");
                location.reload();
            }
        });
    }

    function iniciarSesion() {
        document.getElementById('bloqueo-mando').style.display = 'none';
        document.getElementById('user-tag').innerText = `${usuarioActivo} | ${rangoActivo}`;
        
        // Arrancar motores (Tu lógica original)
        iniciarApp(); 
    }
    // 5. MOTOR PRINCIPAL
    function iniciarApp() {
        // Cargar Pizarra
        refPizarra.on('value', snap => {
            cacheTareas = snap.val() || {};
            renderPizarraLocal();
        });

        // Cargar Chat Global con Filtro Jerárquico
        refChatGlobal.on('value', snap => {
            document.getElementById('chat-msgs').innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const esAdmin = ['DIRECTOR', 'DIRECTORA', 'ADMINISTRACION', 'COORD', 'T.S.', 'TS'].some(r => rangoActivo.includes(r));
                
                // Lógica de visibilidad
                if (m.destino && m.destino !== 'TODOS' && m.destino !== rangoActivo && m.u !== usuarioActivo && !esAdmin) return;

                let claseMsg = m.u === usuarioActivo ? 'msg-me' : 'msg-them';
                let tagPrivado = m.destino && m.destino !== 'TODOS' ? `<span style="color:var(--oro);">[A: ${m.destino}]</span> ` : '';

                document.getElementById('chat-msgs').innerHTML += `
                    <div class="msg ${claseMsg}">
                        <b style="font-size:9px; display:block; opacity:0.7">${m.u} (${m.rol})</b>
                        ${tagPrivado}${m.t}
                    </div>
                `;
            });
            document.getElementById('chat-msgs').scrollTop = 9999;
        });

        // Activar Radar Titanium Universal
        escanearBaseDeDatos();
    }

    // =========================================================
    // MÓDULO RRHH: LIQUIDACIONES PRIVADAS
    // =========================================================
    function cargarDatosPrivados(nombre) {
        document.getElementById('panel-liquidacion').style.display = 'block';
        
        db.ref('/liquidaciones').orderByChild('nombre').equalTo(nombre).on('value', snap => {
            const container = document.getElementById('tabla-container');
            if(!snap.exists()){
                container.innerHTML = "<p style='font-size:12px; color:#64748b;'>No hay liquidaciones pendientes este mes.</p>";
                return;
            }

            let html = '<table style="width:100%; border-collapse:collapse; text-align:left; font-size:13px;">';
            html += '<tr style="background:#f1f5f9;"><th>Sede/Puesto</th><th>Periodo</th><th>Total a Facturar</th></tr>';
            
            let cbu = "", email = "";
            snap.forEach(child => {
                const l = child.val();
                html += `<tr>
                    <td style="padding:8px; border-bottom:1px solid #e2e8f0;">${l.puesto || 'General'}</td>
                    <td style="padding:8px; border-bottom:1px solid #e2e8f0;">${l.periodo}</td>
                    <td style="padding:8px; border-bottom:1px solid #e2e8f0; font-weight:bold;">$${Number(l.total).toLocaleString('es-AR')}</td>
                </tr>`;
                if(l.cbu) cbu = l.cbu;
                if(l.email) email = l.email;
            });
            
            html += '</table>';
            container.innerHTML = html;
            document.getElementById('datos-pago').innerText = `CBU: ${cbu || "No registrado"} | Email: ${email || "No registrado"}`;
        });
    }

    function verificarNotificaciones(nombre) {
        db.ref('/liquidaciones').orderByChild('nombre').equalTo(nombre).once('value', snap => {
            if(snap.exists()) {
                alert("¡Atención! Tiene una nueva liquidación disponible. Por favor, revise su panel de RRHH y presente su factura antes del día 5.");
            }
        });
    }

    // =========================================================
    // MÓDULO TITANIUM: EL RADAR QUE BUSCA DONDE CORRESPONDE
    // =========================================================
    function escanearBaseDeDatos() {
        const selectPac = document.getElementById('sel-paciente');

        // 1. Escanear CUDs en TODA la base
        db.ref('/').once('value', snap => {
            snap.forEach(rama => {
                if (rama.child('pacientes').exists()) {
                    rama.child('pacientes').forEach(childPac => {
                        const nombre = childPac.key;
                        const pac = childPac.val();

                        // Llenar selector sin duplicar
                        if(!listaPacientesCache.includes(nombre)) {
                            listaPacientesCache.push(nombre);
                            let opt = document.createElement('option');
                            opt.value = nombre; opt.text = nombre;
                            selectPac.add(opt);
                        }

                        // Alerta CUD
                        if(pac.cud) {
                            const hoy = new Date();
                            const venc = new Date(pac.cud);
                            const diff = Math.floor((venc - hoy) / (1000 * 60 * 60 * 24));
                            if(diff <= 60) { 
                                renderizarAlerta(nombre, 'CUD', `Vence: ${pac.cud} (${diff} días)`);
                            }
                        }
                    });
                }
            });
        });

        // 2. Escanear Ausencias
        db.ref('/seguimiento_pacientes').on('value', snap => {
            snap.forEach(child => {
                const nombre = child.key;
                let faltas = 0;
                Object.values(child.val()).forEach(estado => { if(estado === 'A' || estado.val === 'A') faltas++; });
                
                if(faltas >= 3) {
                    renderizarAlerta(nombre, 'AUSENCIAS', `Acumula ${faltas} inasistencias.`);
                }
            });
        });
    }

    function renderizarAlerta(paciente, tipo, msg) {
        const feed = document.getElementById('radar-feed');
        if(feed.innerHTML.includes("Monitoreando")) feed.innerHTML = "";
        
        const idUnico = (paciente+tipo).replace(/[^a-zA-Z0-9]/g, '');
        if(document.getElementById(idUnico)) return;

        const color = tipo === 'CUD' ? 'var(--urgente)' : 'var(--oro)';
        feed.innerHTML = `
            <div id="${idUnico}" class="radar-card" style="border-left-color: ${color}">
                <div style="font-size:10px; font-weight:900; color:${color}">${tipo}</div>
                <div style="font-size:13px; margin:4px 0; font-weight:800; color:white;">${paciente}</div>
                <div style="font-size:11px; color:#94a3b8;">${msg}</div>
            </div>
        ` + feed.innerHTML;
        
        document.getElementById('snd-radar').play().catch(()=>{});
    }

    // =========================================================
    // UTILIDADES (BUSCADOR Y TABS)
    // =========================================================
    function filtrarPacientes() {
        let input = document.getElementById('busc-paciente').value.toUpperCase();
        let sel = document.getElementById('sel-paciente');
        let options = sel.getElementsByTagName('option');
        
        for (let i = 0; i < options.length; i++) {
            if (options[i].text.toUpperCase().indexOf(input) > -1) options[i].style.display = "";
            else options[i].style.display = "none";
        }
    }

    function switchTab(tab) {
        document.getElementById('tab1').className = tab === 1 ? 'tab-btn activa' : 'tab-btn';
        document.getElementById('tab2').className = tab === 2 ? 'tab-btn activa' : 'tab-btn';
        document.getElementById('vista-expediente').style.display = tab === 1 ? 'flex' : 'none';
        document.getElementById('vista-global').style.display = tab === 2 ? 'flex' : 'none';
    }

    // =========================================================
    // EXPEDIENTES Y DOMINGUITO
    // =========================================================
    function asignarTS() {
        if(!pacienteSeleccionado) return alert("Selecciona un paciente primero");
        const ts = document.getElementById('sel-asignar-ts').value;
        if(!ts) return;
        refAsignaciones.child(pacienteSeleccionado).set(ts);
        alert(`Paciente asignado a T.S: ${ts}`);
    }

    function cargarExpedientePaciente() {
        pacienteSeleccionado = document.getElementById('sel-paciente').value;
        const chatContainer = document.getElementById('chat-dominguito');
        
        if(!pacienteSeleccionado) {
            chatContainer.innerHTML = `<div style="text-align:center; color:#94a3b8; font-size:11px; margin-top:20px;">Seleccioná un paciente.</div>`;
            return;
        }

        refExpedientes.child(pacienteSeleccionado).on('value', snap => {
            const msgs = snap.val() || {};
            chatContainer.innerHTML = `<div style="font-size:10px; text-align:center; color:#94a3b8; margin-bottom:10px;">EXPEDIENTE ABIERTO: ${pacienteSeleccionado}</div>`;
            
            Object.values(msgs).forEach(m => {
                let claseMsg = m.autor === usuarioActivo ? 'msg-me' : 'msg-them';
                if(m.autor === "DOMINGUITO") claseMsg = 'msg-bot';
                
                chatContainer.innerHTML += `
                    <div class="msg ${claseMsg}">
                        <b style="font-size:9px; display:block; opacity:0.7">${m.autor} (${m.rol})</b>
                        ${m.msg}
                    </div>
                `;
            });
            chatContainer.scrollTop = 9999;
        });
    }

    function enviarReporteDominguito() {
        if(!pacienteSeleccionado) return alert("Seleccioná un paciente");
        const txt = document.getElementById('in-dominguito').value;
        if(!txt) return;

        refExpedientes.child(pacienteSeleccionado).push({ autor: usuarioActivo, rol: rangoActivo, msg: txt, ts: Date.now() });
        document.getElementById('in-dominguito').value = '';
    }

    // =========================================================
    // CHAT GLOBAL
    // =========================================================
    function enviarMsg() {
        const v = document.getElementById('chat-in').value;
        const destino = document.getElementById('select-destino').value; 
        
        if(v) {
            refChatGlobal.push({ u: usuarioActivo, t: v, rol: rangoActivo, destino: destino });
            document.getElementById('chat-in').value=""; 
        } 
    }

    // =========================================================
    // PIZARRA GLOBAL
    // =========================================================
    function renderPizarraLocal() {
        const container = document.getElementById('lista-tareas'); 
        container.innerHTML = "";
        const fEst = document.getElementById('f-est').value;
        
        Object.keys(cacheTareas).reverse().forEach(id => {
            const t = cacheTareas[id];
            
            if(rangoActivo !== 'ADMINISTRACION' && !rangoActivo.includes('DIRECTOR')) {
                if(t.destino !== rangoActivo && t.destino !== 'TODOS' && t.emisor !== usuarioActivo) return;
            }
            if(fEst === 'ACTIVAS' && t.estado === 'CONFIRMADO') return;
            if(fEst === 'CONFIRMADO' && t.estado !== 'CONFIRMADO') return;

            const yaVi = (t.vistos || {})[usuarioActivo];
            container.innerHTML += `
                <div class="task-card prio-${t.prio}">
                    <div style="font-size:9px; color:#64748b; margin-bottom:5px;">VENCE: ${t.vence || 'S/D'} | DE: ${t.emisor}</div>
                    <h3 style="margin:0 0 10px 0; font-size:14px;">${t.desc}</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                        <button class="btn-pro" style="background:${yaVi?'#f1f5f9':'#fff'}; color:${yaVi?'var(--verde)':'#64748b'}; border:1px solid #ccc;" onclick="marcarVisto('${id}')">${yaVi?'✔ VISTO':'VISTO'}</button>
                        <button class="btn-pro" style="background:var(--verde);" onclick="cambiarEst('${id}', 'CONFIRMADO')">LISTO</button>
                    </div>
                </div>`;
        });
    }
    function exportarPDF() {
    if(!pacienteSeleccionado) return alert("Seleccioná un paciente primero para exportar su expediente.");
    const elemento = document.getElementById('chat-dominguito');
    const opciones = {
        margin: 10,
        filename: `Expediente_Clinico_${pacienteSeleccionado}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opciones).from(elemento).save();
}

    function marcarVisto(id) { refPizarra.child(`${id}/vistos/${usuarioActivo}`).set(true); }
    function cambiarEst(id, est) { if(confirm("¿Finalizar misión?")) refPizarra.child(id).update({ estado: est }); }
    function crearTarea() { 
        const d = document.getElementById('t-desc').value; 
        if(!d) return; 
        refPizarra.push({ 
            desc: d, vence: document.getElementById('t-vence').value || 'S/D', prio: document.getElementById('t-prio-val').value, 
            destino: document.getElementById('t-dest-val').value, emisor: usuarioActivo, estado: 'PENDIENTE'
        }); 
        document.getElementById('t-desc').value=""; 
    }

</script>
</body>
</html>
